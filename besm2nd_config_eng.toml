# Stat cost formulas. Each entry needs a display "name" and a Python
# "expression" in terms of v (the stat value). The app compiles these at
# startup and auto-builds the formula selector from the list order.
[stat_formulas]

[[stat_formulas.entries]]
key   = "Default"
name  = "Default"
# Linear: each point costs 1 CP regardless of level.
expression = "v"

[[stat_formulas.entries]]
key   = "Free, then Three"
name  = "Free, then Three"
# First 4 points are free; each point above 4 costs 3 CP.
expression = "0 if v <= 4 else (v - 4) * 3"

[[stat_formulas.entries]]
key   = "Bracket"
name  = "Bracket"
# v 1-4: 1 CP each; v 5-8: 2 CP each; v 9+: 4 CP each (cumulative).
expression = """
if v <= 4: return v
if v <= 8: return 4 + (v - 4) * 2
return 4 + 8 + (v - 8) * 4
"""

# Attribute/weapon cost formulas. Each entry needs a display "name" and a
# Python "expression" in terms of base_cost and level. The app compiles these
# at startup.
[attr_formulas]

[[attr_formulas.entries]]
key   = "Default"
name  = "Default"
# Linear: total cost = base_cost × level.
expression = "base_cost * level"

[[attr_formulas.entries]]
key   = "Triangular"
name  = "Triangular"
# Triangular: each successive level costs base_cost more than the previous.
# lv1 = base, lv2 = 3×base, lv3 = 6×base, lv4 = 10×base …
expression = "base_cost * level * (level + 1) // 2"

