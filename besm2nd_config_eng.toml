# =============================================================================
# BESM 2nd Edition — Game Data Configuration (ENGLISH)
# Edit this file to customise the ruleset. The app reads it at startup.
#
# TRANSLATION RULES:
#   - "key"  = internal identifier used in save files. NEVER change these.
#              For English, key == name (no translation needed).
#   - "name" = display string shown in the UI for this language.
#   - If a "name" field is absent, the program falls back to "key".
# =============================================================================

[lang]
code    = "eng"
label   = "English"
default = true        # Set to true on exactly one TOML to use it as the startup language.

