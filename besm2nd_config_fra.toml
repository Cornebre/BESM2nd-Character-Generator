# BESM 2e Édition — Configuration des données de jeu (FRANÇAIS)
# Modifiez ce fichier pour personnaliser les règles. L'application le lit au démarrage.
#
# RÈGLES DE TRADUCTION :
#   - "key"  = identifiant interne utilisé dans les sauvegardes. NE JAMAIS modifier.
#              La clé est toujours la version anglaise du nom.
#   - "name" = texte affiché dans l'interface pour cette langue.
#   - Si "name" est absent, le programme utilise "key" comme valeur de repli.
# =============================================================================

